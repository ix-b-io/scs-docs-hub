<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>St. Clair Square — approved documents</title>
<meta name="description" content="Current approved documents for St. Clair Square, cleared for public discussion.">
<meta name="robots" content="noindex, nofollow">

<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon-v3.png">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="St. Clair Sq">
<meta name="theme-color" content="#fbfcf7">

<style>
  :root{
    --paper:#fbfcf7;
    --ink:#17170f;
    --hairline:#c9c7b0;
    --muted:#75725f;
    --card:#f7f5e9;
    --titlegreen:#475a3c;
    --red:#e06456; --yellow:#efb93f; --blue:#4fb3e0;
    --green:#3e9b57; --purple:#b05fd3; --pink:#e85d9e;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    background:var(--paper);
    color:var(--ink);
    font:16px/1.55 Futura, "Century Gothic", "Avenir Next", -apple-system, Arial, sans-serif;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .frame{
    max-width:640px; margin:14px auto; padding:26px 20px 34px;
  }
  @media (min-width:480px){ .frame{ margin:24px auto; padding:36px 40px 44px; } }

  /* header */
  header{ padding:0 0 22px; border-bottom:1px solid var(--hairline); }
  .banner{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
  }
  h1{
    font-family:"Bodoni 72", Didot, "Bodoni MT", "Playfair Display", Georgia, serif;
    font-weight:400;
    font-size:clamp(50px, 15vw, 92px);
    line-height:0.98;
    letter-spacing:0.005em;
  }
  .mark{
    flex:none;
    width:clamp(96px, 25vw, 136px); height:auto;
  }
  .subline{ margin-top:12px; color:var(--muted); font-size:14px; }
  .updated{ margin-top:10px; font-size:11px; letter-spacing:0.08em; color:var(--muted); }
  .updated b{ font-weight:400; color:var(--muted); }

  /* document list */
  main{ padding-top:4px; }
  .doc{ border-bottom:1px solid var(--hairline); }
  .cardlink{
    display:block; text-decoration:none; color:inherit;
    padding:20px 0 4px; position:relative;
  }
  .cardlink:focus-visible{ outline:2px solid var(--ink); outline-offset:4px; }
  .doc h2{
    font-family:"Bodoni 72", Didot, "Bodoni MT", "Playfair Display", Georgia, serif;
    font-weight:400; font-size:28px; line-height:1.12;
    padding-right:34px;
  }
  .cardlink::after{
    content:""; position:absolute; right:2px; top:50%;
    width:11px; height:11px; margin-top:-8px;
    border-top:1.5px solid var(--ink); border-right:1.5px solid var(--ink);
    transform:rotate(45deg);
    transition:transform .15s ease;
  }
  .cardlink:hover::after{ transform:rotate(45deg) translate(2px,-2px); }
  .cardlink:hover h2{ text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:4px; }
  .desc{ margin-top:5px; color:var(--muted); font-size:13.5px; line-height:1.35; max-width:46ch; }
  .meta{
    margin-top:8px; font-size:11px; letter-spacing:0.14em; color:var(--muted);
    display:block;
  }
  .actions{ display:flex; gap:26px; padding:0 0 8px; }
  .actions .btn{
    appearance:none; border:none; background:none; color:var(--muted);
    font:inherit; font-size:12.5px; letter-spacing:0.05em; cursor:pointer;
    padding:14px 0; text-decoration:none;
    border-bottom:1px solid transparent;
  }
  .actions .btn:hover{ color:var(--ink); border-bottom-color:var(--ink); }
  .actions .btn:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }
  .actions .btn.copied{ color:var(--green); border-bottom-color:var(--green); }

  /* states */
  .state{ padding:40px 0; color:var(--muted); font-size:15px; }
  .state b{ color:var(--ink); font-weight:600; }

  footer{ padding-top:20px; font-size:12px; font-weight:300; line-height:1.6; color:#8a8776; }
  footer p + p{ margin-top:7px; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="frame">

  <header>
    <div class="banner">
      <h1>St.Clair<br>Square</h1>
      <img class="mark" src="assets/header-mark.png" alt="" width="110" height="110">
    </div>
    <p class="subline">Approved documents, cleared for public discussion</p>
    <p class="updated" id="updated" hidden></p>
  </header>

  <main id="list" aria-live="polite">
    <p class="state">Loading documents…</p>
  </main>

  <footer>
    <p>Every link on this page is permanent. When a document is revised and re-approved, the file behind the link is replaced — anything already sent stays current automatically.</p>
  </footer>

</div>

<script>
(function(){
  const list = document.getElementById('list');
  const updated = document.getElementById('updated');

  const fmt = iso => {
    if(!iso) return '';
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-CA', { year:'numeric', month:'long', day:'numeric' });
  };

  const absUrl = file => /^https?:\/\//i.test(file)
    ? file
    : new URL(file, location.href).href;

  function emailHref(doc, url){
    const subject = `St. Clair Square — ${doc.title}`;
    const body =
`Hello,

Here is the current approved "${doc.title}" for St. Clair Square (approved ${fmt(doc.approved)}):

${url}

This link is permanent — if the document is updated and re-approved, the same link will always show the latest version.

Best regards`;
    return 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  }

  function copyBtnHandler(btn, url){
    btn.addEventListener('click', async () => {
      try{
        await navigator.clipboard.writeText(url);
      }catch(e){
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); ta.remove();
      }
      const label = btn.textContent;
      btn.textContent = 'Link copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = label; btn.classList.remove('copied'); }, 1800);
    });
  }

  function render(data){
    if(data.updated){
      updated.innerHTML = 'Last updated <b>' + fmt(data.updated) + '</b>';
      updated.hidden = false;
    }
    if(!data.documents || !data.documents.length){
      list.innerHTML = '<p class="state"><b>No documents published yet.</b> Approved files will appear here.</p>';
      return;
    }
    list.innerHTML = '';
    data.documents.forEach(doc => {
      const url = absUrl(doc.file);
      const art = document.createElement('article');
      art.className = 'doc';

      
      art.innerHTML =
        '<a class="cardlink" href="' + url + '" target="_blank" rel="noopener">' +
          '<h2></h2>' +
          (doc.description ? '<p class="desc"></p>' : '') +
          (doc.approved ? '<p class="meta">Approved ' + fmt(doc.approved) + '</p>' : '') +
        '</a>' +
        '<div class="actions">' +
          (navigator.share ? '<button class="btn share" type="button">Share</button>' : '') +
          '<button class="btn copy" type="button">Copy link</button>' +
          '<a class="btn" href="' + emailHref(doc, url) + '">Email</a>' +
        '</div>';

      art.querySelector('h2').textContent = doc.title;
      if(doc.description) art.querySelector('.desc').textContent = doc.description;

      const shareBtn = art.querySelector('.share');
      if(shareBtn){
        shareBtn.addEventListener('click', () => {
          navigator.share({
            title: 'St.Clair Square — ' + doc.title,
            text: 'Current approved "' + doc.title + '" for St.Clair Square',
            url: url
          }).catch(() => {});
        });
      }
      copyBtnHandler(art.querySelector('.copy'), url);

      list.appendChild(art);
    });
  }

  fetch('docs.json?v=' + Date.now())
    .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(render)
    .catch(() => {
      list.innerHTML = '<p class="state"><b>Couldn’t load the document list.</b> Check your connection and pull to refresh, or contact the Yar team.</p>';
    });
})();
</script>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
