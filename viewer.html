<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>St.Clair Square — document</title>
<meta name="robots" content="noindex, nofollow">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#f2f0e1">
<style>
  :root{
    --paper:#f2f0e1; --ink:#17170f; --hairline:#c9c7b0; --muted:#75725f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{ height:100%; }
  body{
    background:var(--paper); color:var(--ink);
    font:15px/1.5 Futura, "Century Gothic", "Avenir Next", -apple-system, Arial, sans-serif;
    display:flex; flex-direction:column;
  }

  /* top bar */
  .bar{
    flex:none; display:flex; align-items:center; gap:6px;
    padding:10px 12px;
    padding-top:calc(10px + env(safe-area-inset-top));
    border-bottom:1px solid var(--ink);
    background:var(--paper);
  }
  .bar .title{
    flex:1; min-width:0; text-align:center;
    font-size:13px; letter-spacing:0.04em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    padding:0 4px;
  }
  .bar button, .bar a{
    appearance:none; border:none; background:none; color:var(--ink);
    font:inherit; font-size:14px; cursor:pointer; text-decoration:none;
    padding:8px 10px; display:inline-flex; align-items:center; gap:6px;
    min-height:40px;
  }
  .bar button:focus-visible, .bar a:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }
  .bar svg{ width:18px; height:18px; flex:none; }
  #presentBtn{ display:none; }
  @media (min-width:820px){ #presentBtn{ display:inline-flex; } }

  /* pages */
  #scroller{ flex:1; overflow:auto; -webkit-overflow-scrolling:touch; }
  #pages{ max-width:1100px; margin:0 auto; padding:14px 10px 40px; }
  .page{
    position:relative; margin:0 auto 14px;
    background:#fff; box-shadow:0 0 0 1px var(--hairline);
  }
  .page canvas{ display:block; width:100%; height:100%; }

  .pageNum{
    position:fixed; bottom:14px; right:14px;
    font-size:11.5px; letter-spacing:0.08em; color:var(--muted);
    background:var(--paper); border:1px solid var(--hairline);
    padding:4px 9px; pointer-events:none;
    opacity:0; transition:opacity .25s ease;
    bottom:calc(14px + env(safe-area-inset-bottom));
  }
  .pageNum.show{ opacity:1; }

  /* loading / error */
  .state{
    padding:60px 24px; text-align:center; color:var(--muted); font-size:14.5px;
  }
  .state a{ color:var(--ink); }
  .progress{
    width:min(240px, 70%); height:2px; margin:18px auto 0;
    background:var(--hairline); position:relative; overflow:hidden;
  }
  .progress i{ position:absolute; inset:0; right:100%; background:var(--ink); }

  /* presentation mode */
  body.present{ background:#111008; }
  body.present .bar, body.present .pageNum{ display:none; }
  body.present #scroller{ overflow:hidden; display:flex; align-items:center; justify-content:center; }
  body.present #pages{ max-width:none; padding:0; display:flex; align-items:center; justify-content:center; height:100%; width:100%; }
  body.present .page{ margin:0; box-shadow:none; display:none; }
  body.present .page.current{ display:block; }
  .presentHint{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    color:#8a8878; font-size:12px; letter-spacing:0.1em;
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  body.present .presentHint.show{ opacity:1; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<div class="bar">
  <a href="index.html" id="backBtn" aria-label="Back to all documents">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 3 5 9l6 6"/></svg>
    <span>Documents</span>
  </a>
  <div class="title" id="docTitle">Document</div>
  <button id="presentBtn" aria-label="Present full screen">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7V3h4M15 7V3h-4M3 11v4h4M15 11v4h-4"/></svg>
    <span>Present</span>
  </button>
  <button id="shareBtn" aria-label="Share this document">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11V2m0 0L5.5 5.5M9 2l3.5 3.5M3.5 9v6h11V9"/></svg>
    <span id="shareLabel">Share</span>
  </button>
</div>

<div id="scroller">
  <div id="pages">
    <div class="state" id="loadState">
      Loading document…
      <div class="progress"><i id="progressBar"></i></div>
    </div>
  </div>
</div>

<div class="pageNum" id="pageNum"></div>
<div class="presentHint" id="presentHint">tap right to advance, left to go back · esc to exit</div>

<script src="vendor/pdfjs/pdf.min.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  const pagesEl = document.getElementById('pages');
  const scroller = document.getElementById('scroller');
  const loadState = document.getElementById('loadState');
  const progressBar = document.getElementById('progressBar');
  const pageNum = document.getElementById('pageNum');
  const titleEl = document.getElementById('docTitle');
  const shareBtn = document.getElementById('shareBtn');
  const shareLabel = document.getElementById('shareLabel');
  const presentBtn = document.getElementById('presentBtn');
  const presentHint = document.getElementById('presentHint');

  function fail(msg, directUrl){
    loadState.innerHTML = msg;
    if(directUrl){
      loadState.appendChild(document.createElement('br'));
      loadState.appendChild(document.createElement('br'));
      const a = document.createElement('a');
      a.href = directUrl; a.textContent = 'Open the file directly';
      loadState.appendChild(a);
    }
  }

  if(!file || !/^docs\//.test(file)){
    fail('<b>No document specified.</b> Go back and choose a document.');
    return;
  }
  const pdfUrl = new URL(file, location.href).href;

  // resolve display title from docs.json (fallback: filename)
  let docTitle = file.split('/').pop().replace(/\.pdf$/,'');
  fetch('docs.json?v=' + Date.now()).then(r => r.json()).then(d => {
    const m = (d.documents || []).find(x => x.file === file);
    if(m){ docTitle = m.title; titleEl.textContent = m.title; document.title = 'St.Clair Square — ' + m.title; }
  }).catch(() => {});

  // share: native sheet where available, clipboard elsewhere
  shareBtn.addEventListener('click', async () => {
    if(navigator.share){
      navigator.share({ title: 'St.Clair Square — ' + docTitle, url: pdfUrl }).catch(() => {});
    }else{
      try{ await navigator.clipboard.writeText(pdfUrl); }
      catch(e){
        const ta = document.createElement('textarea');
        ta.value = pdfUrl; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
      }
      shareLabel.textContent = 'Link copied';
      setTimeout(() => { shareLabel.textContent = 'Share'; }, 1800);
    }
  });

  if(!window.pdfjsLib){
    fail('<b>The viewer couldn’t start.</b>', pdfUrl);
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdfjs/pdf.worker.min.js';

  let pdf = null, pageCount = 0, holders = [], rendered = [], renderTasks = [];
  let currentPresentPage = 1;

  // single streamed request: linearized PDFs render page 1 progressively,
  // and the service worker can cache the whole file for offline use
  const loadingTask = pdfjsLib.getDocument({ url: pdfUrl, disableRange: true });
  loadingTask.onProgress = p => {
    if(p.total) progressBar.style.right = (100 - Math.round(p.loaded / p.total * 100)) + '%';
  };

  loadingTask.promise.then(async doc => {
    pdf = doc; pageCount = doc.numPages;
    loadState.remove();

    // build placeholders sized from page 1's aspect ratio (updated per page on render)
    const first = await pdf.getPage(1);
    const vp1 = first.getViewport({ scale: 1 });
    const ratio = vp1.height / vp1.width;

    for(let i = 1; i <= pageCount; i++){
      const holder = document.createElement('div');
      holder.className = 'page';
      holder.dataset.page = i;
      holder.style.aspectRatio = (vp1.width + ' / ' + vp1.height);
      pagesEl.appendChild(holder);
      holders.push(holder);
    }

    // lazy render
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) renderPage(+e.target.dataset.page); });
    }, { root: scroller, rootMargin: '150% 0px' });
    const unloader = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting) return;
        if(document.body.classList.contains('present')) return;
        const n = +e.target.dataset.page;
        if(rendered[n] && e.target.firstChild){
          e.target.replaceChildren();
          rendered[n] = false;
        }
      });
    }, { root: scroller, rootMargin: '400% 0px' });
    holders.forEach(h => unloader.observe(h));
    holders.forEach(h => io.observe(h));

    // page indicator on scroll
    let hideTimer;
    scroller.addEventListener('scroll', () => {
      const mid = scroller.scrollTop + scroller.clientHeight / 2;
      let cur = 1;
      for(const h of holders){ if(h.offsetTop <= mid) cur = +h.dataset.page; }
      pageNum.textContent = cur + ' / ' + pageCount;
      pageNum.classList.add('show');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => pageNum.classList.remove('show'), 1200);
    }, { passive: true });

    renderPage(1); renderPage(2);
  }).catch(err => {
    fail('<b>This document couldn’t be loaded.</b> Check your connection and try again.', pdfUrl);
  });

  async function renderPage(n, force){
    if(!pdf || n < 1 || n > pageCount) return;
    if(rendered[n] && !force) return;
    rendered[n] = true;
    if(renderTasks[n]) renderTasks[n].cancel();
    try{
      const page = await pdf.getPage(n);
      const holder = holders[n-1];
      const cssWidth = holder.clientWidth || pagesEl.clientWidth - 20;
      const vp1 = page.getViewport({ scale: 1 });
      holder.style.aspectRatio = (vp1.width + ' / ' + vp1.height);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      // sharpness headroom, hard-capped: total canvas memory must stay inside iOS limits
      const targetPx = Math.min(cssWidth * dpr * 1.35, 2048);
      const scale = targetPx / vp1.width;
      const vp = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      const task = page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
      renderTasks[n] = task;
      await task.promise;
      holder.replaceChildren(canvas);
    }catch(e){ if(e && e.name !== 'RenderingCancelledException') rendered[n] = false; }
  }

  // orientation / resize: re-render visible range at the new width
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if(!pdf) return;
      const mid = scroller.scrollTop + scroller.clientHeight / 2;
      holders.forEach((h, idx) => {
        const near = Math.abs(h.offsetTop - mid) < scroller.clientHeight * 2;
        if(rendered[idx+1] && near) renderPage(idx+1, true);
        else rendered[idx+1] = false; // will lazily re-render on approach
      });
    }, 250);
  });

  // ---- presentation mode (desktop / large screens) ----
  function fitPresentPage(){
    const holder = holders[currentPresentPage-1];
    if(!holder) return;
    const ar = holder.style.aspectRatio.split('/').map(s => parseFloat(s));
    const availW = window.innerWidth, availH = window.innerHeight;
    const scale = Math.min(availW / ar[0], availH / ar[1]) * 0.96;
    holder.style.width = (ar[0] * scale) + 'px';
    holder.style.height = (ar[1] * scale) + 'px';
    holder.style.aspectRatio = '';
    holder.style.aspectRatio = ar[0] + ' / ' + ar[1];
  }
  function showPresentPage(n){
    currentPresentPage = Math.max(1, Math.min(pageCount, n));
    holders.forEach(h => h.classList.remove('current'));
    const holder = holders[currentPresentPage-1];
    holder.classList.add('current');
    renderPage(currentPresentPage, true);
    renderPage(currentPresentPage + 1);
    fitPresentPage();
  }
  function enterPresent(){
    document.body.classList.add('present');
    (document.documentElement.requestFullscreen || function(){}).call(document.documentElement);
    showPresentPage(currentPresentPage);
    presentHint.classList.add('show');
    setTimeout(() => presentHint.classList.remove('show'), 3000);
  }
  function exitPresent(){
    document.body.classList.remove('present');
    if(document.fullscreenElement) document.exitFullscreen().catch(() => {});
    holders.forEach(h => { h.style.width = ''; h.style.height = ''; h.classList.remove('current'); });
  }
  presentBtn.addEventListener('click', enterPresent);
  document.addEventListener('fullscreenchange', () => { if(!document.fullscreenElement) exitPresent(); });
  document.addEventListener('keydown', e => {
    if(!document.body.classList.contains('present')) return;
    if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') showPresentPage(currentPresentPage + 1);
    else if(e.key === 'ArrowLeft' || e.key === 'PageUp') showPresentPage(currentPresentPage - 1);
    else if(e.key === 'Escape') exitPresent();
  });
  scroller.addEventListener('click', e => {
    if(!document.body.classList.contains('present')) return;
    if(e.clientX < window.innerWidth * 0.25) showPresentPage(currentPresentPage - 1);
    else showPresentPage(currentPresentPage + 1);
  });
  window.addEventListener('resize', () => {
    if(document.body.classList.contains('present')) fitPresentPage();
  });
})();
</script>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
